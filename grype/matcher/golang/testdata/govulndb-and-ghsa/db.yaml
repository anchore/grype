# Combined govulndb + github fixture exercising the build-time merge of go
# symbol information onto GHSA records (see grype/db/v6/build/govulndb_merge.go).
#
# The GHSA records were hand-authored from the real advisories (via the GitHub
# API) rather than extracted, so auto-generate is off.
#
#   - GO-2022-0969 aliases GHSA-69cg-p879-7622, which lists BOTH golang.org/x/net
#     and the golang.org/x/net/http2 sub-package as affected packages: the GHSA
#     gains the x/net symbols, the GO record keeps only stdlib (no GHSA names the
#     "stdlib" module — GHSA-4v7x-pqxf-cx7m comes closest by listing stdlib
#     package paths like net/http, which patch but never cover).
#   - GO-2021-0265 aliases two GHSAs for github.com/tidwall/gjson:
#     GHSA-ppj4-34rq-v8j9 (active) gains the gjson symbols and covers the GO
#     record, which is dropped; GHSA-c9gm-7rfj-8w5h is withdrawn upstream
#     (GitHub marked it a duplicate advisory, as in the real data), so it is
#     neither patched nor allowed to cover, and never matches.
#   - GO-2023-1840 (stdlib-only, whole-package) has no GHSA alias and passes
#     through unchanged.
#   - GO-2022-0635 aliases GHSA-7f33-f4f5-xwgw for github.com/aws/aws-sdk-go:
#     the govulndb range is open-ended (introduced: 0, no fix, so it would
#     flag every version) while the GHSA bounds it at < 1.34.0. The merged
#     record has the GHSA's bounded range AND the govulndb s3crypto symbols,
#     eliminating both false-positive classes.
#   - GO-2024-3312 aliases GHSA-4c49-9fpc-hc3v for github.com/canonical/lxd:
#     LXD does not follow Go module versioning, so the GHSA range is pinned to
#     the pseudo-version of the fix commit; which no real tagged release can
#     ever fall below as v5.21.1 sorts far above v0.0.0-…), a guaranteed false
#     negative. The govulndb record carries the same fix in tag space in
#     custom_ranges (< 5.21.2); the merge replaces the GHSA's pseudo-version
#     range with it and patches the lxd symbols on.
#   - GO-2021-0076 aliases GHSA-gxhv-3hwf-wjp9 for github.com/evanphx/json-patch:
#     a +incompatible module (v3 tags, no /v3 module path). The GHSA's two
#     ranges carry plain semver bounds (>= 3.0.0, < 3.0.1-…) while binaries
#     report v3.0.0+incompatible; the merged record must still match those and
#     carry the Patch.Apply symbols from the GO record.
#   - GO-2025-3540 aliases GHSA-92cp-5422-2mw7 for go-redis: the /vN module
#     major-version case. The GHSA lists only github.com/redis/go-redis/v9 (the
#     only module path real binaries report; buildinfo carries the /v9 suffix);
#     the GO record additionally lists the base path and /v7 and /v8, none of
#     which were ever published module paths. Coverage is per exact name: the
#     /v9 rows are dropped and the GHSA enriched with symbols; the base//v7//v8
#     rows survive on the GO record (inert for real binaries, but dropping them
#     is not the merge's call). The 9.6.0b1 bound is malformed to the golang
#     comparator and its range is inert; this is a known FN tracked in the
#     custom_ranges odd-version-strings follow-up issue.
#   - GO-2026-5013 (golang.org/x/crypto, scoped to golang.org/x/crypto/ssh)
#     aliases ONLY CVE-2026-46597 - no GHSA alias. Its CVE-linked twin
#     GHSA-46q7-xr5m-cr77 (hand-authored, module-level x/crypto < 0.35.0) is held
#     by the merger but never patched, because the merge bridges GO->GHSA by
#     GHSA-id alias on the GO record, not by shared CVE. This models the observed
#     GHSA-twin symbol-scope bypass (see gosymbols_ghsa_bypass_test.go).
auto-generate: false
extractions:
  govulndb:
    - go-2022-0969
    - GO-2023-1840
    - go-2021-0265
    - go-2022-0635
    - go-2024-3312
    - go-2021-0076
    - go-2025-3540
    - go-2026-5013
  github:
    - github:go/GHSA-69cg-p879-7622
    - github:go/GHSA-c9gm-7rfj-8w5h
    - github:go/GHSA-ppj4-34rq-v8j9
    - github:go/GHSA-7f33-f4f5-xwgw
    - github:go/GHSA-4c49-9fpc-hc3v
    - github:go/GHSA-gxhv-3hwf-wjp9
    - github:go/GHSA-92cp-5422-2mw7
    - github:go/GHSA-46q7-xr5m-cr77
